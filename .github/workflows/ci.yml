name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DATABASE_URL: 'postgresql://placeholder@localhost:5432/placeholder'
  NEXTAUTH_SECRET: 'ci-test-secret-not-real'
  NEXTAUTH_URL: 'http://localhost:3000'
  SKIP_PRISMA: 'true'

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npx eslint app/ lib/ components/ --max-warnings 0 || true

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npx prisma generate || true
      - run: npx vitest run --reporter=verbose
        env:
          SKIP_PRISMA: 'true'
          SKIP_API_ANALYSIS: '1'

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npx prisma generate || true
      - run: npm run build
        env:
          DATABASE_URL: 'postgresql://placeholder@localhost:5432/placeholder'
          SKIP_PRISMA: 'true'

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm audit --audit-level=high || true
